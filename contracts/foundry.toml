[profile.default]
src      = "src"
out      = "out"
libs     = ["lib"]
test     = "test"
script   = "script"
solc     = "0.8.24"
optimizer        = true
optimizer_runs   = 200

remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

[profile.default.fuzz]
runs = 256

[rpc_endpoints]
# fill in your RPC URLs
# sepolia = "${SEPOLIA_RPC_URL}"
